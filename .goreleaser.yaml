# Homebrew tap publishing. Every release tag, goreleaser regenerates
# the formula Ruby files and pushes them to vyrwu/homebrew-tap.
# Honors the plugin model: each tool is an independent formula that
# depends_on "vyrwu/tap/atelier" (the core). Users compose what they
# want; third-party plugins coexist via PATH discovery.
brews:
  - name: atelier
    ids: [atelier]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Terminal-centric agentic dev framework — engine
    license: MIT
    dependencies:
      - name: tmux
      - name: fzf
    test: |
      system "#{bin}/atelier", "version"
    install: |
      bin.install "atelier"

  - name: atelier-popupshell
    ids: [atelier-popupshell]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — popup shell
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
    install: |
      bin.install "atelier-popupshell"

  - name: atelier-lazygit
    ids: [atelier-lazygit]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — lazygit launcher
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
      - name: lazygit
    install: |
      bin.install "atelier-lazygit"

  - name: atelier-claude
    ids: [atelier-claude]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — Claude Code integration
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
    install: |
      bin.install "atelier-claude"

  - name: atelier-k8s
    ids: [atelier-k8s]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — k9s + EKS context switcher
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
      - name: k9s
    install: |
      bin.install "atelier-k8s"

  - name: atelier-pg
    ids: [atelier-pg]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — Postgres pgcli launcher
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
      - name: pgcli
    install: |
      bin.install "atelier-pg"

  - name: atelier-aws
    ids: [atelier-aws]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — AWS context switcher
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
      - name: awscli
    install: |
      bin.install "atelier-aws"

  - name: atelier-workspaces
    ids: [atelier-workspaces]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — workspace + worktree manager
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
    install: |
      bin.install "atelier-workspaces"

  - name: atelier-toolselector
    ids: [atelier-toolselector]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — M-; tool picker
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
    install: |
      bin.install "atelier-toolselector"

  # gh-dash isn't in homebrew-core (it's a gh extension). We depend on
  # `gh` and expect the user to `gh extension install dlvhdr/gh-dash`
  # separately — atelier doctor flags the missing binary.
  - name: atelier-ghdash
    ids: [atelier-ghdash]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — gh-dash PR dashboard launcher
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
      - name: gh
    install: |
      bin.install "atelier-ghdash"

  - name: atelier-ghenhance
    ids: [atelier-ghenhance]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — gh enhance-repo launcher
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
      - name: gh
    install: |
      bin.install "atelier-ghenhance"

  # ccusage is an npm package invoked via `npx ccusage`. Depending on
  # `node` gets npx onto PATH; ccusage itself lazy-installs on first
  # run via npx's cache.
  - name: atelier-ccusage
    ids: [atelier-ccusage]
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — Claude API usage snapshot popup
    license: MIT
    dependencies:
      - name: atelier
        version: '{{ .Version }}'
      - name: node
    install: |
      bin.install "atelier-ccusage"

checksum:
  name_template: 'atelier_{{ .Version }}_checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?:'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?:'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))?:'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - typo

release:
  github:
    owner: vyrwu
    name: atelier
  prerelease: auto
  header: |
    ## atelier {{ .Tag }}

    Terminal-centric agentic dev framework. Per-workspace tool clusters in tmux, driven by a Go engine with a plugin architecture.

    See [README](https://github.com/vyrwu/atelier#install) for install instructions and [CONTRIBUTING](https://github.com/vyrwu/atelier/blob/main/CONTRIBUTING.md) for plugin authoring.

  footer: |
    ---

    **Installing the binaries:**

    1. Download the archive matching your OS + arch.
    2. Extract: `tar -xzf atelier_*.tar.gz`
    3. Move the binaries onto your PATH: `mv atelier* ~/.local/bin/`
    4. Verify: `atelier doctor`
    5. Wire into tmux: add `run-shell 'atelier init | tmux source-file -'` to your tmux.conf.

    For checksums, see `atelier_{{ .Version }}_checksums.txt`.
