version: 2

project_name: atelier

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: atelier
    main: ./cmd/atelier
    binary: atelier
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: atelier-popupshell
    main: ./cmd/atelier-popupshell
    binary: atelier-popupshell
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-lazygit
    main: ./cmd/atelier-lazygit
    binary: atelier-lazygit
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-claude
    main: ./cmd/atelier-claude
    binary: atelier-claude
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-k8s
    main: ./cmd/atelier-k8s
    binary: atelier-k8s
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-pg
    main: ./cmd/atelier-pg
    binary: atelier-pg
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-aws
    main: ./cmd/atelier-aws
    binary: atelier-aws
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-workspaces
    main: ./cmd/atelier-workspaces
    binary: atelier-workspaces
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-toolselector
    main: ./cmd/atelier-toolselector
    binary: atelier-toolselector
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-ghdash
    main: ./cmd/atelier-ghdash
    binary: atelier-ghdash
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-ghenhance
    main: ./cmd/atelier-ghenhance
    binary: atelier-ghenhance
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-ccusage
    main: ./cmd/atelier-ccusage
    binary: atelier-ccusage
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

archives:
  # One archive per binary so each Homebrew formula downloads only the
  # binary it installs (vs. a bundle archive where every formula would
  # have to extract one specific binary from the same tar). Naming
  # convention: <bin>_<version>_<os>_<arch>.tar.gz, with darwin→macos
  # and amd64→x86_64 substitution to match Homebrew's expectations.
  - id: atelier
    ids: [atelier]
    name_template: >-
      atelier_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

  - id: atelier-popupshell
    ids: [atelier-popupshell]
    name_template: >-
      atelier-popupshell_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-lazygit
    ids: [atelier-lazygit]
    name_template: >-
      atelier-lazygit_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-claude
    ids: [atelier-claude]
    name_template: >-
      atelier-claude_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-k8s
    ids: [atelier-k8s]
    name_template: >-
      atelier-k8s_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-pg
    ids: [atelier-pg]
    name_template: >-
      atelier-pg_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-aws
    ids: [atelier-aws]
    name_template: >-
      atelier-aws_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-workspaces
    ids: [atelier-workspaces]
    name_template: >-
      atelier-workspaces_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-toolselector
    ids: [atelier-toolselector]
    name_template: >-
      atelier-toolselector_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
