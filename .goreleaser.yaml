    binary: atelier-ghenhance
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-ghpr
    main: ./cmd/atelier-ghpr
    binary: atelier-ghpr
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-ccusage
    main: ./cmd/atelier-ccusage
    binary: atelier-ccusage
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

archives:
  # One archive per binary so each Homebrew formula downloads only the
  # binary it installs (vs. a bundle archive where every formula would
  # have to extract one specific binary from the same tar). Naming
  # convention: <bin>_<version>_<os>_<arch>.tar.gz, with darwin→macos
  # and amd64→x86_64 substitution to match Homebrew's expectations.
  - id: atelier
    ids: [atelier]
    name_template: >-
      atelier_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

  - id: atelier-popupshell
    ids: [atelier-popupshell]
    name_template: >-
      atelier-popupshell_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-lazygit
