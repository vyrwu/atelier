    binary: atelier-lazygit
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-claude
    main: ./cmd/atelier-claude
    binary: atelier-claude
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-k8s
    main: ./cmd/atelier-k8s
    binary: atelier-k8s
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-pg
    main: ./cmd/atelier-pg
    binary: atelier-pg
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: [-s, -w]

  - id: atelier-aws
