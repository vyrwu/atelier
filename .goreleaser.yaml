version: 2

project_name: atelier

before:
  hooks:
    - go mod tidy
    - go test ./...

# One binary. Built-in tools are compiled into `atelier` and dispatched
# in-process via `atelier tools <name>`; user launchers come from
# config.toml. There are no per-tool binaries to build or ship.
builds:
  - id: atelier
    main: ./cmd/atelier
    binary: atelier
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  # One archive containing the single atelier binary. Naming convention:
  # atelier_<version>_<os>_<arch>.tar.gz, with darwin→macos and
  # amd64→x86_64 substitution to match Homebrew's expectations.
  - id: atelier
    ids: [atelier]
    name_template: >-
      atelier_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

# Homebrew tap publishing. A single cask ships the one binary. Its hard
# runtime deps are tmux + fzf; every tool's optional external dependency
# (k9s, pgcli, lazygit, gh, aws-vault, node, …) is surfaced by
# `atelier doctor` rather than forced at install time — install only what
# the tools you actually use need.
#
# `homebrew_casks` replaces the deprecated `brews:` (formulae) key in
# goreleaser v2.13+. Casks ship pre-built binaries directly — the right
# model for atelier since we don't build from source in the user's
# environment. Homebrew supports Linux casks too, so the cross-platform
# story stays intact.
homebrew_casks:
  - name: atelier
    ids: [atelier]
    binaries:
      - atelier
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: TUI-native agentic workspaces — one binary, tmux-driven
    dependencies:
      - formula: tmux
      - formula: fzf

checksum:
  name_template: 'atelier_{{ .Version }}_checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?:'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?:'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))?:'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - typo

release:
  github:
    owner: vyrwu
    name: atelier
  prerelease: auto
  header: |
    ## atelier {{ .Tag }}

    Terminal-centric agentic dev framework. Per-workspace tool clusters in tmux, driven by a single Go binary. Built-in tools are compiled in; extend with `[tools.*]` launchers in config.toml.

    See [README](https://github.com/vyrwu/atelier#install) for install instructions and [CONTRIBUTING](https://github.com/vyrwu/atelier/blob/main/CONTRIBUTING.md) for adding tools.

  footer: |
    ---

    **Installing the binary:**

    1. Download the archive matching your OS + arch.
    2. Extract: `tar -xzf atelier_*.tar.gz`
    3. Move the binary onto your PATH: `mv atelier ~/.local/bin/`
    4. Verify: `atelier doctor`
    5. Launch the bundled runtime: `atelier` — or embed in your tmux with `run-shell 'atelier init | tmux source-file -'`.

    For checksums, see `atelier_{{ .Version }}_checksums.txt`.
