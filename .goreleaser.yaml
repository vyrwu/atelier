# Homebrew tap publishing. Every release tag, goreleaser regenerates
# the cask Ruby files and pushes them to vyrwu/homebrew-tap.
# Honors the plugin model: each tool is an independent cask that
# depends_on cask: atelier (the core). Users compose what they
# want; third-party plugins coexist via PATH discovery.
#
# `homebrew_casks` replaces the deprecated `brews:` (formulae) key
# in goreleaser v2.13+. Casks ship pre-built binaries directly —
# the right model for atelier since we don't build from source in
# the user's environment. Homebrew now supports Linux casks too, so
# the cross-platform story stays intact.
homebrew_casks:
  - name: atelier
    ids: [atelier]
    binaries:
      - atelier
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: TUI-native agentic workspaces — engine
    dependencies:
      - formula: tmux
      - formula: fzf

  - name: atelier-popupshell
    ids: [atelier-popupshell]
    binaries:
      - atelier-popupshell
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — popup shell
    dependencies:
      - cask: atelier

  - name: atelier-lazygit
    ids: [atelier-lazygit]
    binaries:
      - atelier-lazygit
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — lazygit launcher
    dependencies:
      - cask: atelier
      - formula: lazygit

  - name: atelier-claude
    ids: [atelier-claude]
    binaries:
      - atelier-claude
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — Claude Code integration
    dependencies:
      - cask: atelier

  - name: atelier-k8s
    ids: [atelier-k8s]
    binaries:
      - atelier-k8s
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — k9s + EKS context switcher
    dependencies:
      - cask: atelier
      - formula: k9s

  - name: atelier-pg
    ids: [atelier-pg]
    binaries:
      - atelier-pg
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — Postgres pgcli launcher
    dependencies:
      - cask: atelier
      - formula: pgcli

  - name: atelier-aws
    ids: [atelier-aws]
    binaries:
      - atelier-aws
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — AWS context switcher
    dependencies:
      - cask: atelier
      - formula: awscli

  - name: atelier-workspaces
    ids: [atelier-workspaces]
    binaries:
      - atelier-workspaces
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — workspace + worktree manager
    dependencies:
      - cask: atelier

  - name: atelier-toolselector
    ids: [atelier-toolselector]
    binaries:
      - atelier-toolselector
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — M-; tool picker
    dependencies:
      - cask: atelier

  # gh-dash isn't in homebrew-core (it's a gh extension). We depend on
  # `gh` and expect the user to `gh extension install dlvhdr/gh-dash`
  # separately — atelier doctor flags the missing binary.
  - name: atelier-ghdash
    ids: [atelier-ghdash]
    binaries:
      - atelier-ghdash
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — gh-dash PR dashboard launcher
    dependencies:
      - cask: atelier
      - formula: gh

  - name: atelier-ghenhance
    ids: [atelier-ghenhance]
    binaries:
      - atelier-ghenhance
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — gh enhance-repo launcher
    dependencies:
      - cask: atelier
      - formula: gh

  # gh-pr reads PR state via `gh pr view --json` and opens PRs with
  # `gh pr view --web`; depends on `gh` (same as ghdash/ghenhance).
  - name: atelier-ghpr
    ids: [atelier-ghpr]
    binaries:
      - atelier-ghpr
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — per-workspace GitHub PR status badge
    dependencies:
      - cask: atelier
      - formula: gh

  # ccusage is an npm package invoked via `npx ccusage`. Depending on
  # `node` gets npx onto PATH; ccusage itself lazy-installs on first
  # run via npx's cache.
  - name: atelier-ccusage
    ids: [atelier-ccusage]
    binaries:
      - atelier-ccusage
    repository:
      owner: vyrwu
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/vyrwu/atelier
    description: Atelier tool — Claude API usage snapshot popup
    dependencies:
      - cask: atelier
      - formula: node

checksum:
  name_template: 'atelier_{{ .Version }}_checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?:'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?:'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))?:'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - typo

release:
  github:
    owner: vyrwu
    name: atelier
  prerelease: auto
  header: |
    ## atelier {{ .Tag }}

    Terminal-centric agentic dev framework. Per-workspace tool clusters in tmux, driven by a Go engine with a plugin architecture.

    See [README](https://github.com/vyrwu/atelier#install) for install instructions and [CONTRIBUTING](https://github.com/vyrwu/atelier/blob/main/CONTRIBUTING.md) for plugin authoring.

  footer: |
    ---

    **Installing the binaries:**

    1. Download the archive matching your OS + arch.
    2. Extract: `tar -xzf atelier_*.tar.gz`
    3. Move the binaries onto your PATH: `mv atelier* ~/.local/bin/`
    4. Verify: `atelier doctor`
    5. Wire into tmux: add `run-shell 'atelier init | tmux source-file -'` to your tmux.conf.

    For checksums, see `atelier_{{ .Version }}_checksums.txt`.
