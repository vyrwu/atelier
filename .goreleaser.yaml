      atelier-claude_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-k8s
    ids: [atelier-k8s]
    name_template: >-
      atelier-k8s_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-pg
    ids: [atelier-pg]
    name_template: >-
      atelier-pg_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-aws
    ids: [atelier-aws]
    name_template: >-
      atelier-aws_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files: [LICENSE]

  - id: atelier-workspaces
    ids: [atelier-workspaces]
    name_template: >-
