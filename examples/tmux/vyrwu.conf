# vyrwu.conf — reference dev environment built on atelier
#
# This is the actual tmux config the author uses daily, with atelier
# embedded in --bare mode. Showcases what a "real-world" atelier
# setup looks like: dracula theme via TPM, a powerline statusline,
# bash navigation defaults, and atelier providing the per-workspace
# agentic-dev primitives underneath.
#
# Copy as a starting point; replace the theme, plugin list, and
# navigation bindings with whatever you actually want. The only
# load-bearing piece for atelier integration is the
# `run-shell 'atelier init --bare | tmux source-file -'` line.
#
# Requirements:
#   - tmux >= 3.4
#   - TPM (Tmux Plugin Manager) installed at ~/.tmux/plugins/tpm
#   - A Nerd Font for the powerline arrow glyphs
#   - atelier on PATH + at least atelier-claude, atelier-workspaces
#
# Try it: copy to ~/.config/tmux/tmux.conf, install TPM, reload.

# ---------------------------------------------------------------
# atelier engine (the agentic-dev primitives)
# ---------------------------------------------------------------
# --bare = engine wiring only (bindings + hooks + emitters + persistence
# + stamp-statusline). No theme; this file owns the visual layer.
run-shell 'atelier init --bare | tmux source-file -'

# ---------------------------------------------------------------
# tmux behavioral defaults
# ---------------------------------------------------------------
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
setw -g mode-keys vi

# Transparent backgrounds so the terminal's own theme shows through.
set -g status-style "bg=default"
set -g message-style "bg=default"
set -g window-style "bg=default"
set -g window-active-style "bg=default"
set -g popup-style "bg=default"

# Reload key (atelier's M-q is also bound; this is for non-atelier-related reloads)
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message -N -d 1000 "✨ TMUX Reloaded!"

# Vim-style pane navigation
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Pane splits
bind - split-window -v -c "#{pane_current_path}"
bind = split-window -h -c "#{pane_current_path}"

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Copy mode
unbind [
bind ] copy-mode
bind -T copy-mode-vi v send -X begin-selection

# ---------------------------------------------------------------
# TPM plugins
# ---------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'dracula/tmux'

# Dracula theme configuration
set -g status-position top
set -g @dracula-show-powerline true
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-cpu-usage-colors "gray yellow"
set -g @dracula-ram-usage-colors "gray cyan"
set -g @dracula-time-colors "gray orange"
set -g @dracula-day-month true
set -g @dracula-show-timezone true
set -g @dracula-military-time false
set -g @dracula-border-contrast true
set -g pane-border-lines "double"
set -g @dracula-show-left-icon "session"

# Initialize TPM (must be last)
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------------------------------------------
# atelier statusline integration
# ---------------------------------------------------------------
# Active window only; atelier's stamp-statusline injects the
# freshness + attention + forge (PR badge) emitters into this
# format AFTER `#W`.
set -g window-status-format ''
set -g window-status-separator ''
