# powerline.conf — atelier embedded into a powerline-style tmux
#
# Demonstrates atelier's stamp-statusline correctly injecting the
# freshness icon AFTER the powerline arrow exit, so the icon lands
# in the next segment rather than inside the colored name box.
#
# Requires a Nerd Font (for the  arrow glyph).
#
# Try it: tmux -L atelier-powerline -f examples/tmux/powerline.conf

run-shell 'atelier init --bare | tmux source-file -'

# Sensible defaults.
set -g mouse on
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1
setw -g mode-keys vi

# Status bar
set -g status-position top
set -g status-style "bg=default"
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 30

# Two-segment status-left: session name in a colored block, then a
# powerline arrow exit.
set -g status-left "#[fg=colour231,bg=colour103,bold]   #S #[fg=colour103,bg=default] "

# Right side: clock only.
set -g status-right "#[fg=colour103]%H:%M #[default]"

# Window status: hidden when inactive, powerline-styled when active.
# atelier's stamp-statusline (via `atelier init`) injects freshness +
# attention emitters AFTER `#W` AND the following powerline arrow
# glyph, so the icon renders in the right-of-arrow segment instead
# of inside the name block.
set -g window-status-format ""
set -g window-status-separator ""
set -g window-status-current-format "#[fg=colour103,bg=default]#[fg=colour231,bg=colour103,bold] #W #[fg=colour103,bg=default]"
