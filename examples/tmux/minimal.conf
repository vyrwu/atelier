# minimal.conf — atelier embedded into vanilla tmux
#
# The smallest possible setup: drop atelier's engine wiring into your
# tmux.conf, manually wire freshness + attention emitters into the
# active window's status format, no other theming.
#
# Try it: tmux -L atelier-minimal -f examples/tmux/minimal.conf

# Source atelier's engine wiring (bindings, hooks, persistence,
# stamp-statusline). --bare skips atelier's bundled theme so this
# file remains the only source of visual opinions.
run-shell 'atelier init --bare | tmux source-file -'

# Sensible defaults (atelier doesn't set these in --bare mode).
set -g mouse on
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1
setw -g mode-keys vi

# Status bar: a single line at the top with the workspace name +
# atelier emitters. No icons, no colors beyond what atelier emits.
# atelier's stamp-statusline (fired from `atelier init`) will
# INJECT `#(atelier status freshness …)` and `#(atelier status
# attention count)` after the `#W` placeholder below — you don't
# have to hand-wire them.
set -g status-position top
set -g status-style "bg=default"
set -g status-left " "
set -g status-right " %H:%M "
set -g window-status-format ""
set -g window-status-current-format " #W "
set -g window-status-separator ""
