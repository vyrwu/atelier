# Example tmux.conf integrating atelier.
#
# Drop this into ~/.config/tmux/tmux.conf or merge with your existing one.
# Atelier owns all popup/tool bindings; everything else (terminal, mouse,
# pane split, copy-mode, status-line theme) stays under your control.

# ────────────────────────────────────────────────────────────────────────
# Terminal + core behavior
# ────────────────────────────────────────────────────────────────────────

set-option -sa terminal-overrides ",xterm*:Tc"

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Alt+H / Alt+L for prev/next window
bind -n M-H previous-window
bind -n M-L next-window

# Reload config
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "tmux reloaded"

# ────────────────────────────────────────────────────────────────────────
# Pane split + select (vim-style)
# ────────────────────────────────────────────────────────────────────────

unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind = split-window -h -c "#{pane_current_path}"
bind + split-window -v -c "#{pane_current_path}" -p 25

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# ────────────────────────────────────────────────────────────────────────
# Copy-mode (vi)
# ────────────────────────────────────────────────────────────────────────

set-window-option -g mode-keys vi
unbind [
bind ] copy-mode
bind -T popup C-] copy-mode
bind -T copy-mode-vi v send -X begin-selection

# ────────────────────────────────────────────────────────────────────────
# Status line theme (Dracula example — pick your own)
# ────────────────────────────────────────────────────────────────────────

set -g status-position top
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'

set -g @dracula-show-powerline true
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-left-icon "session"

# ────────────────────────────────────────────────────────────────────────
# Atelier — popup tools, workspaces, hooks, statusline
# ────────────────────────────────────────────────────────────────────────

# Option 1: plain sourcing (no TPM)
run-shell 'atelier init | tmux source-file -'

# Option 2: via TPM (uncomment, comment out the run-shell above)
# set -g @plugin 'vyrwu/atelier'

# ────────────────────────────────────────────────────────────────────────
# TPM init — keep at the very bottom
# ────────────────────────────────────────────────────────────────────────

run '~/.tmux/plugins/tpm/tpm'
