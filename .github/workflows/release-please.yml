name: release-please

# release-please watches `main`. For every commit it parses against
# Conventional Commits (feat: / fix: / etc.) and maintains a single
# open "Release PR" that bumps the version + updates CHANGELOG.md.
# Merging that PR tags the repo (e.g. v0.1.0), and the tag triggers
# the existing release.yml workflow which runs goreleaser to publish
# binaries + push formulas to the Homebrew tap.
#
# The author NEVER tags manually. The Release PR IS the release gesture.
#
# Trigger is `workflow_run: ci: completed` (not push) so the Release
# PR is only created / updated when the tip of main has passed CI —
# a broken main can't produce a Release PR that pretends the world
# is fine.
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Only fire on green CI. A failed / cancelled ci run leaves main
    # in a state we don't want to advertise as releasable.
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Manifest mode: version + changelog state lives in
          # .release-please-manifest.json and release-please-config.json
          # rather than being inferred from arguments. Survives renames
          # and multi-package splits cleanly.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
