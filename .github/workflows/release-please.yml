name: release-please

# release-please watches `main`. For every commit it parses against
# Conventional Commits (feat: / fix: / etc.) and maintains a single
# open "Release PR" that bumps the version + updates CHANGELOG.md.
# Merging that PR tags the repo (e.g. v0.1.0), and the tag triggers
# the existing release.yml workflow which runs goreleaser to publish
# binaries + push formulas to the Homebrew tap.
#
# The author NEVER tags manually. The Release PR IS the release gesture.
#
# Trigger is `workflow_run: ci: completed` (not push) so the Release
# PR is only created / updated when the tip of main has passed CI —
# a broken main can't produce a Release PR that pretends the world
# is fine.
#
# Auth uses a GitHub App installation token, NOT the default
# GITHUB_TOKEN. GitHub's loop-prevention rule: events created with
# GITHUB_TOKEN do not trigger further workflow runs. Under GITHUB_TOKEN,
# (a) the Release PR's own CI never runs on release-please's pushes
# (lands in action_required), and (b) the `release: published` event it
# emits does NOT trigger release.yml — so goreleaser never builds
# binaries. An App token is a distinct identity, so both downstream
# workflows fire. This is why v0.2.0–v0.3.0 shipped with zero assets.
#
# Setup (one-time): create a GitHub App with repo permissions
# Contents: read/write + Pull requests: read/write, install it on this
# repo, then set repo variable RELEASE_APP_ID and repo secret
# RELEASE_APP_PRIVATE_KEY (the App's generated .pem).
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Only fire on green CI. A failed / cancelled ci run leaves main
    # in a state we don't want to advertise as releasable.
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      # Mint a short-lived installation token for the release App.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v5
        with:
          # Manifest mode: version + changelog state lives in
          # .release-please-manifest.json and release-please-config.json
          # rather than being inferred from arguments. Survives renames
          # and multi-package splits cleanly.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # App token (not GITHUB_TOKEN) so the tag + release-published
          # event trigger release.yml and the Release PR's CI runs
          # unattended.
          token: ${{ steps.app-token.outputs.token }}
