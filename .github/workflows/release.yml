name: release

# Trigger paths:
#   1. `release: published` — release-please creates the GitHub Release
#      directly via API; the release-published event fires downstream
#      workflows even when release-please uses GITHUB_TOKEN. (Tag-push
#      events from GITHUB_TOKEN do NOT trigger workflows — GitHub's
#      loop-prevention.)
#   2. `workflow_dispatch` — manual override, e.g. to re-run against
#      an existing tag if the automated run failed. Provide the tag
#      as input.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Defaults to latest."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Ubuntu has no default git identity; test hook creates git repos
    # and commits. See ci.yml for the same env block.
    env:
      GIT_AUTHOR_NAME: atelier-ci
      GIT_AUTHOR_EMAIL: ci@atelier.local
      GIT_COMMITTER_NAME: atelier-ci
      GIT_COMMITTER_EMAIL: ci@atelier.local
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # On workflow_dispatch, honor the `tag` input if given so a
          # re-run targets a specific historical tag (e.g. v0.1.0)
          # rather than the branch tip. On release-published, ref is
          # already the tag, so the default is correct.
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install tmux + fzf (for `go test` hook in goreleaser)
        run: sudo apt-get update && sudo apt-get install -y tmux fzf

      - name: Verify build
        run: make build

      - name: Run unit tests
        run: make test

      - name: Run e2e tests
        run: |
          export PATH="$PWD/bin:$PATH"
          go test -tags=e2e ./...

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          # Keep in lockstep with the goreleaser-check version pinned
          # in ci.yml. Must be ≥ v2.10.0 for the archives[].ids and
          # archives[].formats config schema this repo uses.
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to vyrwu/homebrew-tap (set up at:
          # github.com/vyrwu/atelier → Settings → Secrets and variables).
          # Used by goreleaser's homebrew_casks block to push the cask
          # Ruby file into the tap repo on every release.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
