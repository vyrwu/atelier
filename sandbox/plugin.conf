# atelier demo sandbox — plugin/embed mode.
#
# The "real-world" path: a plain tmux server sources atelier's engine
# wiring via `atelier init --bare` and owns all visuals. Launched by
# `go run ./sandbox --mode plugin` on a dedicated socket with the isolated
# sandbox env, so it restores the same seeded workspaces.
#
# Modeled on examples/tmux/minimal.conf.

# Engine wiring only — bindings, hooks, persistence (incl. state restore on
# start), stamp-statusline. --bare skips the bundled theme. `atelier`
# resolves to the sandbox binary (PATH is set by the launcher).
run-shell 'atelier init --bare | tmux source-file -'

set -g mouse on
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1
setw -g mode-keys vi
set -g default-terminal "tmux-256color"

# Active window only — inactive windows render nothing, so the bar shows
# just the workspace you're in (matches examples/tmux/*.conf). atelier's
# stamp-statusline injects freshness/attention/forge after #W in the
# CURRENT format.
set -g status-position top
set -g status-style "bg=colour236,fg=colour250"
set -g status-left "#[bg=colour208,fg=colour236,bold] atelier-sandbox #[bg=colour236,fg=colour208]#[default] "
set -g status-left-length 40
set -g status-right "#[fg=colour245]plugin mode #[fg=colour250]%H:%M "
set -g window-status-format ""
set -g window-status-current-format "#[bg=colour238,fg=colour231,bold] #W #[default]"
set -g window-status-separator ""
